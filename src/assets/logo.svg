<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Circle outline -->
  <circle cx="100" cy="90" r="70" stroke="#0f7a5f" stroke-width="4" fill="none"/>
  
  <!-- Wrench and hand simplified -->
  <g transform="translate(100,85)" stroke="#0f7a5f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Wrench head -->
    <path d="M-8,-42 L-4,-36 L4,-36 L8,-42 L4,-48 L-4,-48 Z"/>
    <!-- Wrench shaft -->
    <line x1="0" y1="-36" x2="0" y2="-10"/>
    <!-- Hand - palm -->
    <path d="M-16,0 C-16,-6 -12,-12 -6,-12 L6,-12 C12,-12 16,-6 16,0 L16,10 C16,16 12,22 6,22 L-6,22 C-12,22 -16,16 -16,10 Z"/>
    <!-- Fingers gripping -->
    <line x1="-10" y1="-4" x2="10" y2="-4"/>
    <line x1="-8" y1="2" x2="8" y2="2"/>
    <line x1="-6" y1="8" x2="6" y2="8"/>
    <!-- Thumb -->
    <path d="M-16,0 C-22,0 -24,6 -22,12 C-20,16 -16,16 -16,10"/>
  </g>
  
  <!-- Text OFICINA -->
  <text x="100" y="178" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="18" fill="#0f7a5f" letter-spacing="3">OFICINA</text>
  <!-- Text EM ORDEM -->
  <text x="100" y="195" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#0f7a5f" letter-spacing="2">EM ORDEM</text>
</svg>