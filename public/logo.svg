<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo Circular Marinho -->
  <circle cx="256" cy="256" r="240" fill="#1A1F2C" stroke="#82E9DE" stroke-width="12"/>
  
  <g transform="translate(256, 220) rotate(-45) translate(-100, -100)">
    <!-- Chave de Boca Estilizada -->
    <rect x="0" y="85" width="200" height="30" rx="15" fill="#82E9DE"/>
    <path d="M190 100 A40 40 0 1 1 270 100" stroke="#82E9DE" stroke-width="12" fill="none"/>
    
    <!-- Mão Simplificada (Formato de garra firme) -->
    <path d="M60 70 C 60 70, 40 100, 60 130 L 140 130 C 160 130, 180 100, 160 70 Z" fill="#1A1F2C" stroke="#82E9DE" stroke-width="14" stroke-linejoin="round"/>
    <line x1="85" y1="75" x2="85" y2="125" stroke="#82E9DE" stroke-width="8" stroke-linecap="round"/>
    <line x1="110" y1="75" x2="110" y2="125" stroke="#82E9DE" stroke-width="8" stroke-linecap="round"/>
    <line x1="135" y1="75" x2="135" y2="125" stroke="#82E9DE" stroke-width="8" stroke-linecap="round"/>
  </g>

  <text x="256" y="385" fill="#82E9DE" font-family="sans-serif" font-weight="900" font-size="42" text-anchor="middle" style="letter-spacing: 2px;">OFICINA EM</text>
  <text x="256" y="445" fill="#82E9DE" font-family="sans-serif" font-weight="900" font-size="60" text-anchor="middle" style="letter-spacing: 4px;">ORDEM</text>
</svg>
