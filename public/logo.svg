<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo Circular -->
  <circle cx="256" cy="256" r="240" fill="#1A1F2C" stroke="#82E9DE" stroke-width="12"/>
  
  <!-- Ícone Centralizado e Rotacionado -->
  <g transform="translate(256, 210) rotate(-45) translate(-100, -100)">
    <!-- Chave de Boca (Wrench) -->
    <rect x="0" y="85" width="180" height="30" rx="15" fill="#82E9DE"/>
    <path d="M170 100C170 100 180 70 210 70C240 70 250 100 250 100C250 100 240 130 210 130C180 130 170 100 170 100Z" fill="#1A1F2C" stroke="#82E9DE" stroke-width="12"/>
    <rect x="210" y="88" width="45" height="24" fill="#1A1F2C"/>

    <!-- Mão (Hand) - Dedos dobrados sobre a chave -->
    <rect x="40" y="60" width="25" height="80" rx="12" stroke="#82E9DE" stroke-width="12" fill="#1A1F2C"/>
    <rect x="75" y="60" width="25" height="80" rx="12" stroke="#82E9DE" stroke-width="12" fill="#1A1F2C"/>
    <rect x="110" y="60" width="25" height="80" rx="12" stroke="#82E9DE" stroke-width="12" fill="#1A1F2C"/>
    <rect x="145" y="60" width="25" height="80" rx="12" stroke="#82E9DE" stroke-width="12" fill="#1A1F2C"/>
    
    <!-- Base da mão / Punho -->
    <path d="M30 140C30 140 20 190 70 210C120 230 170 190 170 150" stroke="#82E9DE" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Texto Curvado ou Reto conforme a imagem -->
  <text x="256" y="380" fill="#82E9DE" font-family="Arial, sans-serif" font-weight="bold" font-size="46" text-anchor="middle" style="text-transform: uppercase; letter-spacing: 2px;">OFICINA EM</text>
  <text x="256" y="445" fill="#82E9DE" font-family="Arial, sans-serif" font-weight="bold" font-size="62" text-anchor="middle" style="text-transform: uppercase; letter-spacing: 4px;">ORDEM</text>
</svg>
